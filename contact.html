<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact &mdash; VIB3 Trades</title>
<style>
  :root { --bg:#0d0b1a; --card:#171430; --txt:#f3f0ff; --muted:#a89fce; --accent:#8b5cf6; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:radial-gradient(circle at 50% 0%,#241a44 0%,var(--bg) 60%); color:var(--txt);
    line-height:1.6; min-height:100vh; }
  .wrap { max-width:720px; margin:0 auto; padding:48px 24px; }
  .logo { font-size:26px; font-weight:800; text-align:center; margin-bottom:32px; }
  .logo span { background:linear-gradient(90deg,#a78bfa,#ec4899); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; }
  .card { background:var(--card); border:1px solid #2a2550; border-radius:18px; padding:28px; }
  h1 { font-size:26px; margin-bottom:16px; }
  p { color:#d8d2f5; margin-bottom:14px; }
  a.email { color:var(--accent); font-weight:700; text-decoration:none; font-size:18px; }
  a.email:hover { text-decoration:underline; }
  .row { margin-bottom:14px; }
  .label { color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:.5px; }
  nav { text-align:center; margin-top:32px; }
  nav a { color:var(--accent); text-decoration:none; margin:0 12px; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Vib3 <span>Trades</span></div>
  <div class="card">
    <h1>Contact Us</h1>
    <p>Questions, support, or account help &mdash; we'd love to hear from you.</p>
    <div class="row">
      <div class="label">Email</div>
      <a class="email" href="mailto:vib3trades@docsmarketplacellc.com">vib3trades@docsmarketplacellc.com</a>
    </div>
    <div class="row">
      <div class="label">Support</div>
      <p>We aim to respond to all inquiries within 2 business days.</p>
    </div>
    <div class="row">
      <div class="label">Mailing</div>
      <p>Docs Marketplace LLC &mdash; VIB3 Trades<br>United States</p>
    </div>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </nav>
</div>
</body>
</html>
